sprint_8_notes: >
  Sprint 8 closed 2026-07-11 (commit 1414754). Wired transactional emails (Resend + React Email):
  enrollment confirmation on payment webhook, live class reminder on registration, refund status
  notifications on request/approve/reject. Created /api/resend/webhook for delivery tracking.
  Refund flow shipped end-to-end (student request → admin approve/reject → email + DB update).

sprint_9_notes: >
  Sprint 9 completed 2026-07-12. All 5 stories done: design system audit (email template
  exception added to no-tailwind ESLint rule), responsive breakpoint infrastructure
  (--bp-sm/md/lg/xl + --side-pad + --max-* in globals.css, 3 helper classes), BottomNav
  component (4-slot, mobile-only, safe-area-inset), marketing+auth mobile-first refactor
  (landing page rewrite, pricing grid, auth/checkout padding), student app shell refactor
  (dashboard stats grid, tools grid, certificates/payments token fixes, BottomNav on
  dashboard/tools). All pages render at 390px and 1280px. Lint clean. 7 commits.

sprint_10_notes: >
  Sprint 10 closed 2026-07-13. Test infrastructure complete: vitest.config.ts,
  src/lib/__tests__/ (8 test files), src/app/actions/__tests__/ (3 test files),
  playwright.config.ts, scripts/check-coverage.js. 50/53 tests passing; 3 broken mocks
  in tool-actions.test.ts (requireAuth not mocked). CI workflow has tsc, lint, vitest,
  playwright, lighthouse-ci, gitleaks. Coverage threshold 70% enforced on src/lib and
  src/app/actions. S10 carry-over to S12: fix 3 broken tool-action mocks.

sprint_11_notes: >
  Sprint 11 — Observability closed 2026-07-13 (commit 82d181f). 5/5 stories shipped.
  Sentry setup (@sentry/nextjs@^9, client/server/edge configs, source maps, release
  tracking). Structured logging (Pino + AsyncLocalStorage request context, redaction,
  console.* removed from critical paths). Server-action tracing (withActionTracing HOC
  + edge-friendly middleware-context). Lighthouse CI (.lighthouserc.json with assertions
  for perf/a11y/best-practices/seo + LCP/TBT budgets). Slack alerting
  (scripts/sentry-slack-alert.ts with summary + spike modes, scheduled CI job daily
  01:00 UTC summary + every 30 min spike). 17 files (10 added, 7 modified) in a single
  commit. S11 carry-over to S12: src/instrumentation.ts (CHANGELOG references, not yet
  authored; functionally optional under @sentry/nextjs@^9 auto-detection).
