sprint_8_notes: >
  Sprint 8 closed 2026-07-11 (commit 1414754). Wired transactional emails (Resend + React Email):
  enrollment confirmation on payment webhook, live class reminder on registration, refund status
  notifications on request/approve/reject. Created /api/resend/webhook for delivery tracking.
  Refund flow shipped end-to-end (student request → admin approve/reject → email + DB update).

sprint_9_notes: >
  Sprint 9 plan: 5 pts / 5 stories. Polish + mobile-first refactor. Closes design-system
  debt (STORY-038 audit + Tailwind purge + ESLint rules), establishes responsive foundation
  (STORY-039 tokens + breakpoints + helper classes), ships shared mobile shell
  (STORY-040 BottomNav), then refactors 12 pages across marketing+auth (STORY-041) and
  student-app (STORY-042) clusters. See docs/sprint-9/PLAN.md and docs/stories/STORY-03[8-9].md
  through STORY-042.md for full story bodies.